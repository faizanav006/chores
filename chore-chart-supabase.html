<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Chart</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#534AB7;
    --green:#639922;--green-light:#EAF3DE;--green-dark:#3B6D11;
    --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#854F0B;
    --teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#0F6E56;
    --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#993C1D;
    --pink:#D4537E;--pink-light:#FBEAF0;--pink-dark:#993556;
    --blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#185FA5;
    --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
    --bg:#F7F6FF;--surface:#FFFFFF;--border:#E5E3F5;
    --text:#1a1730;--text2:#6b6880;--text3:#a09cb8;
    --radius:14px;--radius-sm:9px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}

  /* HOME */
  .home-header{background:var(--purple);padding:28px 20px 20px;color:white;text-align:center;}
  .home-title{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
  .home-sub{font-size:14px;opacity:0.85;margin-top:4px;}
  .home-body{padding:20px;flex:1;}
  .child-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px;}
  .child-card{background:var(--surface);border-radius:var(--radius);border:2px solid var(--border);padding:18px 12px;text-align:center;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
  .child-card:hover{border-color:var(--purple);transform:translateY(-2px);}
  .child-card:active{transform:scale(0.97);}
  .child-avatar{font-size:44px;margin-bottom:8px;display:block;}
  .child-card-name{font-size:16px;font-weight:600;color:var(--text);}
  .child-card-sub{font-size:12px;color:var(--text2);margin-top:2px;}
  .child-progress-bar{background:#f0eeff;border-radius:20px;height:6px;margin:8px 0 4px;overflow:hidden;}
  .child-progress-fill{background:var(--green);height:100%;border-radius:20px;transition:width 0.4s;}
  .child-pts{font-size:12px;color:var(--amber);font-weight:600;}
  .child-streak{font-size:11px;color:var(--amber-dark);margin-top:2px;}
  .parent-btn{display:block;width:100%;background:none;border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--text2);cursor:pointer;text-align:center;}
  .parent-btn:hover{background:var(--surface);border-color:var(--purple);color:var(--purple);}

  /* PIN */
  .pin-screen{align-items:center;justify-content:center;padding:40px 20px;}
  .pin-box{background:var(--surface);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:320px;text-align:center;border:1.5px solid var(--border);}
  .pin-big-avatar{font-size:56px;margin-bottom:8px;}
  .pin-title{font-size:20px;font-weight:700;color:var(--text);}
  .pin-sub{font-size:14px;color:var(--text2);margin-top:4px;margin-bottom:20px;}
  .pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:6px;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--purple);background:transparent;transition:background 0.15s;}
  .pin-dot.filled{background:var(--purple);}
  .pin-error{font-size:13px;color:var(--red);min-height:18px;margin-bottom:12px;}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
  .numpad-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-size:22px;font-weight:600;cursor:pointer;color:var(--text);transition:background 0.1s;}
  .numpad-btn:hover{background:#ebe9ff;}
  .numpad-btn:active{transform:scale(0.94);}
  .back-link{margin-top:18px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:none;}
  .back-link:hover{color:var(--purple);}

  /* CHORES */
  .chores-header{background:var(--purple);padding:20px;color:white;}
  .chores-header-row{display:flex;align-items:center;gap:12px;}
  .chores-avatar{font-size:36px;}
  .chores-name{font-size:19px;font-weight:700;}
  .chores-streak{font-size:13px;opacity:0.85;margin-top:2px;}
  .pts-badge{background:rgba(255,255,255,0.2);color:white;border-radius:20px;padding:6px 14px;font-size:14px;font-weight:700;margin-left:auto;white-space:nowrap;}
  .progress-wrap{margin-top:14px;background:rgba(255,255,255,0.2);border-radius:20px;height:10px;overflow:hidden;}
  .progress-inner{background:white;height:100%;border-radius:20px;transition:width 0.4s;}
  .progress-label{font-size:12px;opacity:0.8;margin-top:5px;}
  .chores-body{padding:16px;flex:1;}
  .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin:16px 0 8px;}
  .chore-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:10px;transition:border-color 0.15s,opacity 0.2s;}
  .chore-card.done{opacity:0.55;}
  .chore-card:hover:not(.done){border-color:var(--purple);}
  .check-circle{width:32px;height:32px;border-radius:50%;border:2.5px dashed #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;}
  .check-circle.done{border:none;font-size:18px;}
  .chore-emoji{font-size:24px;flex-shrink:0;}
  .chore-info{flex:1;min-width:0;}
  .chore-title{font-size:15px;font-weight:600;color:var(--text);}
  .chore-card.done .chore-title{text-decoration:line-through;}
  .sched-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:3px;}
  .chore-pts{font-size:13px;font-weight:700;color:var(--amber);white-space:nowrap;}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:1.5px solid rgba(255,255,255,0.35);color:white;border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;cursor:pointer;margin-bottom:12px;}

  /* CELEBRATE */
  .celebrate-screen{align-items:center;justify-content:center;padding:40px 20px;background:var(--purple-light);}
  .celebrate-box{background:var(--surface);border-radius:var(--radius);padding:36px 28px;width:100%;max-width:340px;text-align:center;border:1.5px solid var(--border);position:relative;overflow:hidden;}
  .celebrate-icon{font-size:64px;animation:pop 0.5s ease-out;}
  .celebrate-title{font-size:26px;font-weight:700;color:var(--text);margin:10px 0 4px;}
  .celebrate-sub{font-size:15px;color:var(--text2);}
  .celebrate-pts{font-size:36px;font-weight:700;color:var(--amber);margin:10px 0 4px;}
  .celebrate-streak{font-size:14px;color:var(--amber-dark);margin-bottom:20px;}
  @keyframes pop{0%{transform:scale(0.4);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(400px) rotate(720deg);opacity:0;}}
  .confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall 2s ease-in forwards;pointer-events:none;}

  /* ADMIN */
  .admin-header{background:var(--text);padding:20px;color:white;display:flex;align-items:center;gap:12px;}
  .admin-header-title{font-size:18px;font-weight:700;flex:1;}
  .admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--surface);}
  .admin-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color 0.15s;}
  .admin-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
  .admin-body{padding:16px;flex:1;overflow-y:auto;}
  .admin-panel{display:none;}
  .admin-panel.active{display:block;}

  /* CARDS in admin */
  .item-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .item-card-info{flex:1;min-width:0;}
  .item-card-title{font-size:14px;font-weight:600;color:var(--text);}
  .item-card-sub{font-size:12px;color:var(--text2);margin-top:2px;}
  .icon-btn{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 9px;cursor:pointer;font-size:14px;color:var(--text2);display:inline-flex;align-items:center;}
  .icon-btn:hover{background:var(--bg);}
  .icon-btn.danger{color:var(--red);border-color:#f7c1c1;}
  .icon-btn.danger:hover{background:var(--red-light);}
  .small-action-btn{background:var(--purple-light);color:var(--purple-dark);border:1.5px solid #afa9ec;border-radius:var(--radius-sm);padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
  .small-action-btn:hover{background:#dddaf8;}

  /* FORMS */
  .form-card{background:var(--bg);border-radius:var(--radius);padding:18px;margin-top:12px;border:1.5px solid var(--border);}
  .form-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;}
  .form-group{margin-bottom:12px;}
  .form-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;}
  .form-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;background:var(--surface);color:var(--text);outline:none;}
  .form-input:focus{border-color:var(--purple);}
  .form-select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;background:var(--surface);color:var(--text);outline:none;appearance:none;}
  .emoji-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .emoji-btn{font-size:22px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:5px 9px;cursor:pointer;}
  .emoji-btn.selected{border-color:var(--purple);background:var(--purple-light);}
  .btn-primary{background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;}
  .btn-primary:hover{background:var(--purple-dark);}
  .btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1.5px solid var(--border);}
  .stat-val{font-size:20px;font-weight:700;color:var(--text);}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px;}
  .add-btn{width:100%;background:var(--purple-light);color:var(--purple-dark);border:1.5px dashed #afa9ec;border-radius:var(--radius-sm);padding:11px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .add-btn:hover{background:#dddaf8;}

  /* child selector radio */
  .child-selector{display:flex;flex-direction:column;gap:8px;}
  .child-radio-label{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:border-color 0.15s;}
  .child-radio-label:hover{border-color:var(--purple);}
  .child-radio-label input[type=radio]{accent-color:var(--purple);width:17px;height:17px;flex-shrink:0;}
  .child-radio-label input[type=checkbox]{accent-color:var(--purple);width:17px;height:17px;flex-shrink:0;}
  .child-radio-label.selected{border-color:var(--purple);background:var(--purple-light);}
  .child-radio-name{font-size:14px;font-weight:600;color:var(--text);}
  .child-radio-pts{font-size:12px;color:var(--text2);}

  /* rewards */
  .reward-card{background:var(--amber-light);border:1.5px solid #FAC775;border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .reward-pts{background:#EF9F27;color:#412402;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;white-space:nowrap;}
  .reward-name{flex:1;font-size:14px;font-weight:600;color:#412402;}

  /* points panel per child */
  .pts-child-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
  .pts-child-info{flex:1;}
  .pts-bars{margin-top:6px;}
  .pts-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .pts-bar-label{font-size:11px;color:var(--text2);width:60px;flex-shrink:0;}
  .pts-bar{flex:1;background:#f0eeff;border-radius:20px;height:8px;overflow:hidden;}
  .pts-bar-fill{height:100%;border-radius:20px;}

  .hidden{display:none!important;}
  .divider{height:1px;background:var(--border);margin:12px 0;}
</style>
</head>
<body>


<!-- LOADING SCREEN -->
<div id="loading-screen" style="display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div style="font-size:48px;">⭐</div>
  <div style="font-size:16px;font-weight:700;color:var(--purple);">Loading Chore Chart...</div>
  <div style="font-size:13px;color:var(--text2);">Connecting to database</div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">Chore Chart ⭐</div>
    <div class="home-sub">Who's doing chores today?</div>
  </div>
  <div class="home-body">
    <div id="child-grid" class="child-grid"></div>
    <button class="parent-btn" onclick="goAdminLogin()">
      <i class="ti ti-settings"></i> Parent login
    </button>
  </div>
</div>

<!-- PIN -->
<div id="screen-pin" class="screen pin-screen">
  <div class="pin-box">
    <div id="pin-avatar" class="pin-big-avatar"></div>
    <div id="pin-name" class="pin-title"></div>
    <div class="pin-sub">Enter your PIN</div>
    <div id="pin-dots" class="pin-dots"></div>
    <div id="pin-error" class="pin-error"></div>
    <div class="numpad">
      <button class="numpad-btn" onclick="enterPin(1)">1</button>
      <button class="numpad-btn" onclick="enterPin(2)">2</button>
      <button class="numpad-btn" onclick="enterPin(3)">3</button>
      <button class="numpad-btn" onclick="enterPin(4)">4</button>
      <button class="numpad-btn" onclick="enterPin(5)">5</button>
      <button class="numpad-btn" onclick="enterPin(6)">6</button>
      <button class="numpad-btn" onclick="enterPin(7)">7</button>
      <button class="numpad-btn" onclick="enterPin(8)">8</button>
      <button class="numpad-btn" onclick="enterPin(9)">9</button>
      <div></div>
      <button class="numpad-btn" onclick="enterPin(0)">0</button>
      <button class="numpad-btn" onclick="deletePin()"><i class="ti ti-backspace"></i></button>
    </div>
    <button class="back-link" onclick="goScreen('screen-home');renderHome();">Back</button>
  </div>
</div>

<!-- CHORES -->
<div id="screen-chores" class="screen">
  <div class="chores-header">
    <button class="back-btn" onclick="goScreen('screen-home');renderHome();"><i class="ti ti-arrow-left"></i> Home</button>
    <div class="chores-header-row">
      <div id="chore-avatar" class="chores-avatar"></div>
      <div>
        <div id="chore-name" class="chores-name"></div>
        <div id="chore-streak" class="chores-streak"></div>
      </div>
      <div id="chore-pts" class="pts-badge"></div>
    </div>
    <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <div style="font-size:11px;opacity:0.75;margin-bottom:4px;font-weight:600;letter-spacing:0.4px;">TODAY</div>
        <div class="progress-wrap" style="margin-top:0;"><div id="progress-inner-daily" class="progress-inner"></div></div>
        <div id="progress-label-daily" class="progress-label"></div>
      </div>
      <div>
        <div style="font-size:11px;opacity:0.75;margin-bottom:4px;font-weight:600;letter-spacing:0.4px;">THIS WEEK</div>
        <div class="progress-wrap" style="margin-top:0;background:rgba(255,255,255,0.15);"><div id="progress-inner-weekly" style="background:rgba(255,255,255,0.7);height:100%;border-radius:20px;transition:width 0.4s;"></div></div>
        <div id="progress-label-weekly" class="progress-label"></div>
      </div>
    </div>
  </div>
  <div class="chores-body" id="chores-body"></div>
</div>

<!-- CELEBRATE -->
<div id="screen-celebrate" class="screen celebrate-screen">
  <div class="celebrate-box" id="celebrate-box">
    <div class="celebrate-icon">🎉</div>
    <div class="celebrate-title">Amazing job!</div>
    <div id="cel-sub" class="celebrate-sub"></div>
    <div id="cel-pts" class="celebrate-pts"></div>
    <div id="cel-streak" class="celebrate-streak"></div>
    <button class="btn-primary" style="width:100%;" onclick="goScreen('screen-home');renderHome();">Back to home</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="screen-admin-login" class="screen pin-screen">
  <div class="pin-box">
    <div class="pin-big-avatar">🔐</div>
    <div class="pin-title">Parent login</div>
    <div class="pin-sub">Enter admin PIN <span style="font-size:12px;color:var(--text3);">(demo: 1234)</span></div>
    <div id="admin-pin-dots" class="pin-dots"></div>
    <div id="admin-pin-error" class="pin-error"></div>
    <div class="numpad">
      <button class="numpad-btn" onclick="enterAdminPin(1)">1</button>
      <button class="numpad-btn" onclick="enterAdminPin(2)">2</button>
      <button class="numpad-btn" onclick="enterAdminPin(3)">3</button>
      <button class="numpad-btn" onclick="enterAdminPin(4)">4</button>
      <button class="numpad-btn" onclick="enterAdminPin(5)">5</button>
      <button class="numpad-btn" onclick="enterAdminPin(6)">6</button>
      <button class="numpad-btn" onclick="enterAdminPin(7)">7</button>
      <button class="numpad-btn" onclick="enterAdminPin(8)">8</button>
      <button class="numpad-btn" onclick="enterAdminPin(9)">9</button>
      <div></div>
      <button class="numpad-btn" onclick="enterAdminPin(0)">0</button>
      <button class="numpad-btn" onclick="deleteAdminPin()"><i class="ti ti-backspace"></i></button>
    </div>
    <button class="back-link" onclick="goScreen('screen-home');renderHome();">Back</button>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div class="admin-header">
    <i class="ti ti-settings" style="font-size:20px;"></i>
    <div class="admin-header-title">Parent dashboard</div>
    <button class="icon-btn" onclick="goScreen('screen-home');renderHome();" style="color:white;border-color:rgba(255,255,255,0.3);" title="Log out"><i class="ti ti-logout"></i></button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" id="atab-children" onclick="adminTab('children')"><i class="ti ti-users"></i> Children</button>
    <button class="admin-tab" id="atab-chores" onclick="adminTab('chores')"><i class="ti ti-checklist"></i> Chores</button>
    <button class="admin-tab" id="atab-rewards" onclick="adminTab('rewards')"><i class="ti ti-gift"></i> Rewards</button>
    <button class="admin-tab" id="atab-points" onclick="adminTab('points')"><i class="ti ti-chart-bar"></i> Points</button>
  </div>
  <div class="admin-body">

    <!-- CHILDREN PANEL -->
    <div id="admin-children" class="admin-panel active">
      <div id="children-list"></div>
      <button class="add-btn" onclick="toggleForm('add-child-form')"><i class="ti ti-plus"></i> Add child</button>
      <div id="add-child-form" class="form-card hidden">
        <div class="form-title">New child</div>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" id="nc-name" placeholder="e.g. Mia">
        </div>
        <div class="form-group">
          <label class="form-label">Choose avatar</label>
          <div id="nc-avatar-picker" class="emoji-grid"></div>
        </div>
        <div class="form-group">
          <label class="form-label">4-digit PIN</label>
          <input class="form-input" id="nc-pin" placeholder="e.g. 1234" maxlength="4" type="number">
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="addChild()" style="flex:1;">Save</button>
          <button class="btn-secondary" onclick="toggleForm('add-child-form')">Cancel</button>
        </div>
      </div>
    </div>

    <!-- CHORES PANEL -->
    <div id="admin-chores" class="admin-panel">
      <div id="chores-list-admin"></div>
      <button class="add-btn" onclick="toggleForm('add-chore-form')"><i class="ti ti-plus"></i> Add chore</button>
      <div id="add-chore-form" class="form-card hidden">

const thisMonth=()=>{const d=new Date();return d.getFullYear()+'-'+d.getMonth();};

function isDone(chore,childId){
  const ch=state.children.find(c=>c.id===childId);
  if(!ch)return false;
  const key=ch.name;
  const doneOn=chore.done_on?chore.done_on[key]:null;
  if(!doneOn)return false;
  if(chore.schedule==='daily') return doneOn===today();
  if(chore.schedule==='weekly') return doneOn===thisWeek();
  if(chore.schedule==='monthly') return doneOn===thisMonth();
  return false;
}

// ─── Load all data from Supabase ─────────────────────────────
async function loadFamily(){
  showLoading(true);
  try{
    const [{data:settings},{data:children},{data:chores},{data:rewards}] = await Promise.all([
      supabase.from('cc_settings').select('*').single(),
      supabase.from('cc_children').select('*').order('created_at'),
      supabase.from('cc_chores').select('*').order('created_at'),
      supabase.from('cc_rewards').select('*').order('pts')
    ]);
    if(settings) state.adminPin=settings.admin_pin||'1234';
    state.children=children||[];
    state.chores=(chores||[]).map(c=>({...c,done_on:c.done_on||{},child_ids:c.child_ids||[]}));
    state.rewards=rewards||[];
  } catch(e){
    console.error('Supabase error:',e);
    showError('Could not connect. Check your Supabase URL and API key.');
    return;
  }
  showLoading(false);
  renderHome();
}

}

// ─── Supabase save/delete helpers ────────────────────────────
async function saveChild(ch){
  const {id,...data}=ch;
  // map camelCase to snake_case for supabase
  const row={
    name:data.name, avatar:data.avatar, pin:data.pin,
    week_points:data.week_points||data.weekPoints||0,
    month_points:data.month_points||data.monthPoints||0,
    total_points:data.total_points||data.totalPoints||0,
    streak:data.streak||0
  };
  if(id){
    await supabase.from('cc_children').update(row).eq('id',id);
  } else {
    const {data:inserted}=await supabase.from('cc_children').insert(row).select().single();
    ch.id=inserted.id;
    Object.assign(ch,inserted);
  }
}

async function saveChore(chore){
  const {id,...data}=chore;
  const row={
    name:data.name, emoji:data.emoji, schedule:data.schedule,
    points:data.points, child_ids:data.child_ids||data.childIds||[],
    done_on:data.done_on||data.doneOn||{}
  };
  if(id){
    await supabase.from('cc_chores').update(row).eq('id',id);
  } else {
    const {data:inserted}=await supabase.from('cc_chores').insert(row).select().single();
    chore.id=inserted.id;
    Object.assign(chore,inserted);
  }
}

async function saveReward(reward){
  const {id,...data}=reward;
  const row={name:data.name,pts:data.pts};
  if(id){
    await supabase.from('cc_rewards').update(row).eq('id',id);
  } else {
    const {data:inserted}=await supabase.from('cc_rewards').insert(row).select().single();
    reward.id=inserted.id;
    Object.assign(reward,inserted);
  }
}

async function deleteChild(id){ await supabase.from('cc_children').delete().eq('id',id); }
async function deleteChore(id){ await supabase.from('cc_chores').delete().eq('id',id); }
async function deleteReward(id){ await supabase.from('cc_rewards').delete().eq('id',id); }

// ─── UI helpers ───────────────────────────────────────────────
function goScreen(id){

}
function goAdminLogin(){

}
function renderPinDots(elId,buf,len){
  const el=document.getElementById(elId);
  el.innerHTML='';
  for(let i=0;i<len;i++){
    const d=document.createElement('span');
    d.className='pin-dot'+(i<buf.length?' filled':'');
    el.appendChild(d);

}

// ─── Home ─────────────────────────────────────────────────────
function renderHome(){
  const grid=document.getElementById('child-grid');
  grid.innerHTML='';
  if(!state.children.length){
    grid.innerHTML='<div style="text-align:center;color:var(--text2);font-size:14px;padding:20px 0;">No children yet — log in as parent to add some!</div>';
  }
  state.children.forEach(ch=>{
    const myChores=state.chores.filter(c=>(c.child_ids||[]).includes(ch.id));
    const done=myChores.filter(c=>isDone(c,ch.id)).length;
    const total=myChores.length;
    const pct=total?Math.round(done/total*100):0;

    card.className='child-card';
    card.innerHTML=`
      <span class="child-avatar">${ch.avatar}</span>

    `;

function startLogin(childId){
  pinBuffer='';currentChildId=childId;

// ─── Chores screen ────────────────────────────────────────────
function loadChores(childId){
  currentChildId=childId;
  const ch=state.children.find(c=>c.id===childId);
  document.getElementById('chore-avatar').textContent=ch.avatar;
  document.getElementById('chore-name').textContent=ch.name+"'s chores";
  document.getElementById('chore-streak').textContent=(ch.streak||0)>0?`🔥 ${ch.streak}-day streak`:'Start your streak today!';
  document.getElementById('chore-pts').textContent=`⭐ ${ch.week_points||0} pts`;
  renderChoreList();
  goScreen('screen-chores');
}

function renderChoreList(){
  const ch=state.children.find(c=>c.id===currentChildId);
  const myChores=state.chores.filter(c=>(c.child_ids||[]).includes(currentChildId));
  const dailyChores=myChores.filter(c=>c.schedule==='daily');
  const dailyDone=dailyChores.filter(c=>isDone(c,currentChildId)).length;
  const dailyTotal=dailyChores.length;
  const dailyPct=dailyTotal?Math.round(dailyDone/dailyTotal*100):0;
  document.getElementById('progress-inner-daily').style.width=dailyPct+'%';
  document.getElementById('progress-label-daily').textContent=dailyTotal?`${dailyDone} of ${dailyTotal} done`:'No daily chores';
  const weeklyDone=myChores.filter(c=>isDone(c,currentChildId)).length;
  document.getElementById('progress-inner-weekly').style.width=(myChores.length?Math.round(weeklyDone/myChores.length*100):0)+'%';
  document.getElementById('progress-label-weekly').textContent=`${ch.week_points||0} pts earned`;
  document.getElementById('chore-pts').textContent=`⭐ ${ch.week_points||0} pts`;

  const body=document.getElementById('chores-body');
  body.innerHTML='';
  ['daily','weekly','monthly'].forEach(sched=>{
    const group=myChores.filter(c=>c.schedule===sched);
    if(!group.length)return;
    const label=document.createElement('div');
    label.className='section-label';
    label.textContent=SCHED[sched].label+' chores';
    body.appendChild(label);
    group.forEach((chore,i)=>{
      const done=isDone(chore,currentChildId);
      const col=CARD_COLORS[i%CARD_COLORS.length];
      const card=document.createElement('div');
      card.className='chore-card'+(done?' done':'');
      card.style.borderColor=done?col+'55':col+'33';
      card.innerHTML=`
        <div class="check-circle${done?' done':''}" style="${!done?'border-color:'+col+';':'background:'+col+';'}">
          ${done?'✓':''}
        </div>
        <div class="chore-emoji">${chore.emoji}</div>
        <div class="chore-info">
          <div class="chore-title">${chore.name}</div>
          ${done?'<div style="font-size:11px;color:var(--text3);margin-top:2px;">Tap to undo</div>':''}
        </div>
        <div class="chore-pts" style="color:${done?'var(--green)':'var(--amber)'};">${done?'✓':'+'+chore.points}</div>
      `;
      card.onclick=()=>done?untickChore(chore.id):tickChore(chore.id);
      body.appendChild(card);
    });
  });
}

async function tickChore(choreId){
  const chore=state.chores.find(c=>c.id===choreId);
  if(!chore)return;
  const ch=state.children.find(c=>c.id===currentChildId);
  if(!chore.done_on) chore.done_on={};
  if(chore.schedule==='daily') chore.done_on[ch.name]=today();
  else if(chore.schedule==='weekly') chore.done_on[ch.name]=thisWeek();
  else if(chore.schedule==='monthly') chore.done_on[ch.name]=thisMonth();
  ch.week_points=(ch.week_points||0)+chore.points;
  ch.month_points=(ch.month_points||0)+chore.points;
  ch.total_points=(ch.total_points||0)+chore.points;
  renderChoreList();
  await saveChore(chore);
  await saveChild(ch);
  const myChores=state.chores.filter(c=>(c.child_ids||[]).includes(currentChildId));
  if(myChores.every(c=>isDone(c,currentChildId))){
    ch.streak=(ch.streak||0)+1;
    await saveChild(ch);
    setTimeout(()=>celebrate(ch),400);
  }
}

async function untickChore(choreId){
  const chore=state.chores.find(c=>c.id===choreId);
  if(!chore)return;
  const ch=state.children.find(c=>c.id===currentChildId);
  if(chore.done_on) delete chore.done_on[ch.name];
  ch.week_points=Math.max(0,(ch.week_points||0)-chore.points);
  ch.month_points=Math.max(0,(ch.month_points||0)-chore.points);
  ch.total_points=Math.max(0,(ch.total_points||0)-chore.points);
  renderChoreList();
  await saveChore(chore);
  await saveChild(ch);
}

function celebrate(ch){
  document.getElementById('cel-sub').textContent=ch.name+' finished all chores!';
  document.getElementById('cel-pts').textContent='⭐ '+(ch.week_points||0)+' pts this week';
  document.getElementById('cel-streak').textContent='🔥 '+(ch.streak||0)+'-day streak!';
  const box=document.getElementById('celebrate-box');
  const colors=['#7F77DD','#1D9E75','#EF9F27','#D4537E','#378ADD','#D85A30'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'%';p.style.top='0px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*0.8+'s';
    p.style.animationDuration=(1.5+Math.random())+'s';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    box.appendChild(p);setTimeout(()=>p.remove(),3000);
  }
  goScreen('screen-celebrate');
}

        <div class="item-card-title">${ch.name}</div>
        <div class="item-card-sub">${done}/${myChores.length} today · ⭐ ${ch.week_points||0} wk · 🔥 ${ch.streak||0} streak</div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
          <button class="small-action-btn" onclick="resetToday('${ch.id}')"><i class="ti ti-refresh"></i> Reset today</button>
          <button class="small-action-btn" onclick="resetWeek('${ch.id}')"><i class="ti ti-refresh"></i> Reset week</button>
          <button class="small-action-btn" onclick="resetMonth('${ch.id}')"><i class="ti ti-refresh"></i> Reset month</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button class="icon-btn" onclick="openEditChild('${ch.id}')" title="Edit"><i class="ti ti-pencil"></i></button>
        <button class="icon-btn danger" onclick="removeChild('${ch.id}')" title="Delete"><i class="ti ti-trash"></i></button>
      </div>`;
    el.appendChild(d);
  });
  buildAvatarPicker();
}

function buildAvatarPicker(){
  const pick=document.getElementById('nc-avatar-picker');
  if(!pick)return;pick.innerHTML='';
  AVATARS.forEach(a=>{
    const btn=document.createElement('button');
    btn.className='emoji-btn'+(a===selAvatar?' selected':'');btn.textContent=a;
    btn.onclick=()=>{selAvatar=a;pick.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');};
    pick.appendChild(btn);
  });
}

async function addChild(){
  const name=document.getElementById('nc-name').value.trim();
  const pin=String(document.getElementById('nc-pin').value).trim();
  if(!name||!/^\d{4}$/.test(pin)){alert('Enter a name and a 4-digit PIN');return;}
  const newChild={name,avatar:selAvatar,pin,week_points:0,month_points:0,total_points:0,streak:0};
  await saveChild(newChild);
  state.children.push(newChild);
  document.getElementById('nc-name').value='';document.getElementById('nc-pin').value='';
  toggleForm('add-child-form');
  renderChildrenAdmin();renderChoresAdmin();renderHome();
}

async function removeChild(id){
  const ch=state.children.find(c=>c.id===id);
  showConfirm('Remove '+ch.name+'?','This will also remove their assigned chores.',async()=>{
    await deleteChild(id);
    state.children=state.children.filter(c=>c.id!==id);
    for(const chore of state.chores){
      if((chore.child_ids||[]).includes(id)){
        chore.child_ids=chore.child_ids.filter(x=>x!==id);
        if(!chore.child_ids.length){ await deleteChore(chore.id); }
        else { await saveChore(chore); }
      }
    }
    state.chores=state.chores.filter(c=>c.child_ids&&c.child_ids.length>0);
    renderChildrenAdmin();renderChoresAdmin();renderHome();
  });
}

async function resetToday(id){
  const ch=state.children.find(c=>c.id===id);
  for(const c of state.chores.filter(x=>(x.child_ids||[]).includes(id)&&x.schedule==='daily')){
    if(c.done_on) delete c.done_on[ch.name];
    await saveChore(c);
  }
  renderChildrenAdmin();renderHome();
}
async function resetWeek(id){
  const ch=state.children.find(c=>c.id===id);
  ch.week_points=0;
  for(const c of state.chores.filter(x=>(x.child_ids||[]).includes(id)&&x.schedule==='weekly')){
    if(c.done_on) delete c.done_on[ch.name];
    await saveChore(c);
  }
  await saveChild(ch);renderChildrenAdmin();renderHome();
}
async function resetMonth(id){
  const ch=state.children.find(c=>c.id===id);
  ch.month_points=0;
  for(const c of state.chores.filter(x=>(x.child_ids||[]).includes(id)&&x.schedule==='monthly')){
    if(c.done_on) delete c.done_on[ch.name];
    await saveChore(c);
  }
  await saveChild(ch);renderChildrenAdmin();renderHome();
}

let editSelAvatar=AVATARS[0];
function openEditChild(id){
  const ch=state.children.find(c=>c.id===id);
  editSelAvatar=ch.avatar;
  document.getElementById('edit-child-id').value=id;
  document.getElementById('edit-child-name').value=ch.name;
  document.getElementById('edit-child-pin').value='';
  const pick=document.getElementById('edit-avatar-picker');pick.innerHTML='';
  AVATARS.forEach(a=>{
    const btn=document.createElement('button');
    btn.className='emoji-btn'+(a===editSelAvatar?' selected':'');btn.textContent=a;
    btn.onclick=()=>{editSelAvatar=a;pick.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');};
    pick.appendChild(btn);
  });
  document.getElementById('edit-child-modal').style.display='flex';
}
function closeEditChild(){document.getElementById('edit-child-modal').style.display='none';}
async function saveEditChild(){
  const id=document.getElementById('edit-child-id').value;
  const name=document.getElementById('edit-child-name').value.trim();
  const pin=document.getElementById('edit-child-pin').value.trim();
  if(!name){alert('Name cannot be empty');return;}
  if(pin&&!/^\d{4}$/.test(pin)){alert('PIN must be 4 digits');return;}
  const ch=state.children.find(c=>c.id===id);
  ch.name=name;ch.avatar=editSelAvatar;
  if(pin) ch.pin=pin;
  await saveChild(ch);
  closeEditChild();renderChildrenAdmin();renderHome();
}

// ─── Admin — Chores ───────────────────────────────────────────
function renderChoresAdmin(){
  const el=document.getElementById('chores-list-admin');el.innerHTML='';
  ['daily','weekly','monthly'].forEach(sched=>{
    const group=state.chores.filter(c=>c.schedule===sched);
    if(!group.length)return;
    const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=SCHED[sched].label;el.appendChild(lbl);
    group.forEach(chore=>{
      const assignedNames=(chore.child_ids||[]).map(id=>state.children.find(c=>c.id===id)).filter(Boolean).map(c=>c.avatar+' '+c.name).join(', ');
      const d=document.createElement('div');d.className='item-card';
      d.innerHTML=`
        <div style="font-size:22px;">${chore.emoji}</div>
        <div class="item-card-info">
          <div class="item-card-title">${chore.name}</div>
          <div class="item-card-sub">${assignedNames||'Unassigned'} · <span style="background:${SCHED[sched].bg};color:${SCHED[sched].color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;">${SCHED[sched].label}</span> · +${chore.points} pts</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
          <button class="icon-btn" onclick="openEditChore('${chore.id}')" title="Edit"><i class="ti ti-pencil"></i></button>
          <button class="icon-btn danger" onclick="removeChore('${chore.id}')" title="Delete"><i class="ti ti-trash"></i></button>
        </div>`;
      el.appendChild(d);
    });
  });
  buildChorePickers();
}

function buildChorePickers(){
  const ep=document.getElementById('nch-emoji-picker');
  if(ep){ep.innerHTML='';CHORE_EMOJIS.forEach(e=>{const btn=document.createElement('button');btn.className='emoji-btn'+(e===selChoreEmoji?' selected':'');btn.textContent=e;btn.onclick=()=>{selChoreEmoji=e;ep.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');};ep.appendChild(btn);});}
  const cs=document.getElementById('nch-child-selector');
  if(cs){
    cs.innerHTML='';
    if(!state.children.length){cs.innerHTML='<div style="font-size:13px;color:var(--text2);">No children added yet</div>';return;}
    state.children.forEach(ch=>{
      const lbl=document.createElement('label');lbl.className='child-radio-label';
      lbl.innerHTML=`<input type="checkbox" value="${ch.id}"><span style="font-size:22px;">${ch.avatar}</span><div><div class="child-radio-name">${ch.name}</div><div class="child-radio-pts">⭐ ${ch.week_points||0} pts this week</div></div>`;
      lbl.querySelector('input').addEventListener('change',function(){lbl.classList.toggle('selected',this.checked);});
      cs.appendChild(lbl);
    });
  }
}

async function addChore(){
  const name=document.getElementById('nch-name').value.trim();
  const schedule=document.getElementById('nch-schedule').value;
  const points=parseInt(document.getElementById('nch-points').value)||10;
  const child_ids=Array.from(document.querySelectorAll('#nch-child-selector input[type=checkbox]:checked')).map(i=>i.value);
  if(!name){alert('Enter a chore name');return;}
  if(!child_ids.length){alert('Select at least one child');return;}
  const newChore={name,emoji:selChoreEmoji,child_ids,schedule,points,done_on:{}};
  await saveChore(newChore);
  state.chores.push(newChore);
  document.getElementById('nch-name').value='';document.getElementById('nch-points').value='10';
  toggleForm('add-chore-form');renderChoresAdmin();renderHome();
}

async function removeChore(id){
  const ch=state.chores.find(c=>c.id===id);
  showConfirm('Delete "'+ch.name+'"?','This chore will be removed for all assigned children.',async()=>{
    await deleteChore(id);
    state.chores=state.chores.filter(c=>c.id!==id);
    renderChoresAdmin();renderHome();
  });
}

let editSelChoreEmoji=CHORE_EMOJIS[0];
function openEditChore(id){
  const chore=state.chores.find(c=>c.id===id);
  editSelChoreEmoji=chore.emoji;
  document.getElementById('edit-chore-id').value=id;
  document.getElementById('edit-chore-name').value=chore.name;
  document.getElementById('edit-chore-schedule').value=chore.schedule;
  document.getElementById('edit-chore-points').value=chore.points;
  const ep=document.getElementById('edit-chore-emoji-picker');ep.innerHTML='';
  CHORE_EMOJIS.forEach(e=>{const btn=document.createElement('button');btn.className='emoji-btn'+(e===editSelChoreEmoji?' selected':'');btn.textContent=e;btn.onclick=()=>{editSelChoreEmoji=e;ep.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');};ep.appendChild(btn);});
  const cs=document.getElementById('edit-chore-child-selector');cs.innerHTML='';
  state.children.forEach(ch=>{
    const assigned=(chore.child_ids||[]).includes(ch.id);
    const lbl=document.createElement('label');lbl.className='child-radio-label'+(assigned?' selected':'');
    lbl.innerHTML=`<input type="checkbox" value="${ch.id}" ${assigned?'checked':''}><span style="font-size:22px;">${ch.avatar}</span><div><div class="child-radio-name">${ch.name}</div><div class="child-radio-pts">⭐ ${ch.week_points||0} pts this week</div></div>`;
    lbl.querySelector('input').addEventListener('change',function(){lbl.classList.toggle('selected',this.checked);});
    cs.appendChild(lbl);
  });
  document.getElementById('edit-chore-modal').style.display='flex';
}
function closeEditChore(){document.getElementById('edit-chore-modal').style.display='none';}
async function saveEditChore(){
  const id=document.getElementById('edit-chore-id').value;
  const name=document.getElementById('edit-chore-name').value.trim();
  const schedule=document.getElementById('edit-chore-schedule').value;
  const points=parseInt(document.getElementById('edit-chore-points').value)||10;
  const child_ids=Array.from(document.querySelectorAll('#edit-chore-child-selector input[type=checkbox]:checked')).map(i=>i.value);
  if(!name){alert('Enter a chore name');return;}
  if(!child_ids.length){alert('Assign to at least one child');return;}
  const chore=state.chores.find(c=>c.id===id);
  chore.name=name;chore.emoji=editSelChoreEmoji;chore.schedule=schedule;chore.points=points;chore.child_ids=child_ids;
  await saveChore(chore);
  closeEditChore();renderChoresAdmin();renderHome();
}

// ─── Admin — Rewards ──────────────────────────────────────────
function renderRewardsAdmin(){
  const el=document.getElementById('rewards-list');el.innerHTML='';
  state.rewards.sort((a,b)=>a.pts-b.pts).forEach(r=>{
    const d=document.createElement('div');d.className='reward-card';
    d.innerHTML=`<div class="reward-pts">⭐ ${r.pts}</div><div class="reward-name">${r.name}</div><button class="icon-btn danger" onclick="removeReward('${r.id}')"><i class="ti ti-trash"></i></button>`;
    el.appendChild(d);
  });
}
async function addReward(){
  const name=document.getElementById('nr-name').value.trim();
  const pts=parseInt(document.getElementById('nr-pts').value);
  if(!name||!pts){alert('Enter a name and points');return;}
  const newReward={name,pts};
  await saveReward(newReward);
  state.rewards.push(newReward);
  document.getElementById('nr-name').value='';document.getElementById('nr-pts').value='';
  toggleForm('add-reward-form');renderRewardsAdmin();
}
async function removeReward(id){
  await deleteReward(id);
  state.rewards=state.rewards.filter(r=>r.id!==id);
  renderRewardsAdmin();
}

// ─── Admin — Points ───────────────────────────────────────────
function renderPointsAdmin(){
  const el=document.getElementById('points-list');el.innerHTML='';
  if(!state.children.length){el.innerHTML='<div style="font-size:14px;color:var(--text2);">No children yet</div>';return;}
  const maxWeek=Math.max(...state.children.map(c=>c.week_points||0),1);
  const maxMonth=Math.max(...state.children.map(c=>c.month_points||0),1);
  state.children.forEach(ch=>{
    const nextReward=state.rewards.filter(r=>r.pts>(ch.week_points||0)).sort((a,b)=>a.pts-b.pts)[0];
    const d=document.createElement('div');d.className='pts-child-row';
    d.innerHTML=`
      <div style="font-size:30px;">${ch.avatar}</div>
      <div class="pts-child-info">
        <div style="font-size:15px;font-weight:700;color:var(--text);">${ch.name}</div>
        <div class="pts-bars">
          <div class="pts-bar-wrap"><div class="pts-bar-label">This week</div><div class="pts-bar"><div class="pts-bar-fill" style="width:${Math.round((ch.week_points||0)/maxWeek*100)}%;background:#7F77DD;"></div></div><div style="font-size:12px;font-weight:700;color:#7F77DD;min-width:36px;text-align:right;">⭐${ch.week_points||0}</div></div>
          <div class="pts-bar-wrap"><div class="pts-bar-label">This month</div><div class="pts-bar"><div class="pts-bar-fill" style="width:${Math.round((ch.month_points||0)/maxMonth*100)}%;background:#1D9E75;"></div></div><div style="font-size:12px;font-weight:700;color:#1D9E75;min-width:36px;text-align:right;">⭐${ch.month_points||0}</div></div>
        </div>
        ${nextReward?`<div style="font-size:11px;color:var(--amber-dark);margin-top:4px;">🎁 Next: <b>${nextReward.name}</b> — ${nextReward.pts-(ch.week_points||0)} more pts!</div>`:'<div style="font-size:11px;color:var(--green-dark);margin-top:4px;">🏆 All rewards unlocked!</div>'}
      </div>`;
    el.appendChild(d);
  });
  const lbl=document.createElement('div');lbl.className='section-label';lbl.style.marginTop='20px';lbl.textContent='Rewards ladder';el.appendChild(lbl);
  state.rewards.sort((a,b)=>a.pts-b.pts).forEach(r=>{const d=document.createElement('div');d.className='reward-card';d.innerHTML=`<div class="reward-pts">⭐ ${r.pts}</div><div class="reward-name">${r.name}</div>`;el.appendChild(d);});
}

// ─── Shared UI ────────────────────────────────────────────────
let confirmCallback=null;
function showConfirm(msg,sub,cb){
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-sub').textContent=sub;
  const m=document.getElementById('confirm-modal');m.style.display='flex';
  document.getElementById('confirm-yes').onclick=()=>{closeConfirm();cb();};
}
function closeConfirm(){document.getElementById('confirm-modal').style.display='none';}

function toggleForm(id){
  const el=document.getElementById(id);el.classList.toggle('hidden');
  if(id==='add-chore-form'&&!el.classList.contains('hidden'))buildChorePickers();
  if(id==='add-child-form'&&!el.classList.contains('hidden'))buildAvatarPicker();
}

// ─── Boot ─────────────────────────────────────────────────────
renderPinDots('pin-dots','',4);
renderPinDots('admin-pin-dots','',4);
loadFamily();

</script>
</body>
</html>
